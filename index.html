<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rainbow Text Tool</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.ico">
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #0f0f0f; color: #e0e0e0; display: flex; justify-content: center; }
        .container { max-width: 750px; width: 100%; background: #181818; padding: 25px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #00ff88; margin-top: 0; text-align: center; letter-spacing: 1px; }
        label { display: block; margin: 15px 0 5px; font-weight: 600; color: #888; font-size: 13px; }
        textarea { width: 100%; height: 80px; padding: 12px; border-radius: 6px; border: 1px solid #444; background: #222; color: #fff; box-sizing: border-box; font-size: 15px; }
        select { width: 100%; padding: 10px; border-radius: 6px; background: #222; color: #fff; border: 1px solid #444; cursor: pointer; }
        .options-row { display: flex; align-items: center; margin: 15px 0; background: #222; padding: 10px; border-radius: 6px; border: 1px solid #333; }
        .options-row input { margin-right: 10px; transform: scale(1.2); cursor: pointer; }
        .btn { width: 100%; padding: 15px; margin-top: 15px; border: none; border-radius: 6px; background: #00ff88; color: #000; font-weight: 800; cursor: pointer; font-size: 15px; }
        .btn:hover { background: #00cc6e; }
        
        /* Fixed Export Code Box */
        #preview { 
            margin-top: 5px; 
            padding: 15px; 
            background: #000; 
            border-radius: 6px; 
            font-family: monospace; 
            font-size: 11px; 
            color: #888; 
            border: 1px solid #333; 
            max-height: 150px; 
            overflow-y: auto; 
            word-wrap: break-word;
            overflow-wrap: break-word;
            white-space: normal;
        }
        
        #visual-preview { 
            margin-top: 5px; 
            padding: 20px; 
            background: #111; 
            border-radius: 6px; 
            border: 1px solid #444; 
            min-height: 50px; 
            font-size: 24px; 
            font-weight: bold; 
            text-align: center;
            letter-spacing: 1px;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .success-msg { color: #00ff88; text-align: center; margin-top: 10px; font-weight: bold; opacity: 0; transition: 0.3s; }
    </style>
</head>
<body>

<div class="container">
    <h2>Rainbow Text Tool for BetterChat</h2>
    <label style="color: #ffaa00; text-align: center;">Elevator Game 64 Limit: 7,000 | Standard Games: 200</label>
    
    <label>INPUT TEXT</label>
    <textarea id="input" placeholder="Type here..."></textarea>

    <label>CHOOSE MODE</label>
    <select id="mode">
        <option value="combined">Combined: (#color / [#dark / t])</option>
        <option value="text-only">Text Color Only: (#color / t)</option>
        <option value="outline-only">Outline Color: [#color / t]</option>
        <option value="dark-outline-only">Darker Outline Only: [#dark / t]</option>
    </select>

    <div class="options-row">
        <input type="checkbox" id="compress">
        <label for="compress" style="margin: 0; cursor: pointer; color: #fff;">Compress Characters (Remove Spaces)</label>
    </div>

    <label>ACTUAL COLOR PREVIEW</label>
    <div id="visual-preview"></div>
    
    <button class="btn" onclick="copyResult()">Copy Text</button>
    <div id="status" class="success-msg">Copied to clipboard!</div>

    <label>EXPORT CODE (RAW)</label>
    <div id="preview"></div>
</div>

<script>
    const input = document.getElementById('input');
    const mode = document.getElementById('mode');
    const compress = document.getElementById('compress');
    const preview = document.getElementById('preview');
    const visualPreview = document.getElementById('visual-preview');
    const status = document.getElementById('status');

    function getColors(i, step) {
        const h = (i * step) % 360;
        const s = 100, l = 50;
        const a = s * Math.min(l / 100, 1 - l / 100) / 100;
        const f = n => {
            const k = (n + h / 30) % 12;
            const color = (l / 100) - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
            return Math.round(255 * color);
        };
        const r = f(0), g = f(8), b = f(4);
        const hex = "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
        const dr = Math.floor(r / 2.5), dg = Math.floor(g / 2.5), db = Math.floor(b / 2.5);
        const darkHex = "#" + ((1 << 24) + (dr << 16) + (dg << 8) + db).toString(16).slice(1);
        return { hex, darkHex };
    }

    function generate() {
        const text = input.value;
        const selectedMode = mode.value;
        const isCompressed = compress.checked;
        let codeResult = "";
        let visualHTML = "";
        let step = 15; 
        const slash = isCompressed ? "/" : " / ";

        for (let i = 0; i < text.length; i++) {
            if (text[i] === " ") { 
                codeResult += " "; 
                visualHTML += " ";
                continue; 
            }
            const { hex, darkHex } = getColors(i, step);

            let charStyle = "";

            if (selectedMode === "text-only") {
                codeResult += `(${hex}${slash}${text[i]})`;
                charStyle = `color: ${hex};`;
            } else if (selectedMode === "outline-only") {
                codeResult += `[${hex}${slash}${text[i]}]`;
                charStyle = `color: white; text-shadow: 1px 1px 2px ${hex}, -1px -1px 2px ${hex};`;
            } else if (selectedMode === "dark-outline-only") {
                codeResult += `[${darkHex}${slash}${text[i]}]`;
                charStyle = `color: white; text-shadow: 1px 1px 2px ${darkHex}, -1px -1px 2px ${darkHex};`;
            } else if (selectedMode === "combined") {
                codeResult += `(${hex}${slash}[${darkHex}${slash}${text[i]}])`;
                charStyle = `color: ${hex}; text-shadow: 2px 2px 0px ${darkHex};`;
            }

            visualHTML += `<span style="${charStyle}">${text[i]}</span>`;
        }

        preview.innerText = codeResult;
        visualPreview.innerHTML = visualHTML;
        return codeResult;
    }

    function copyResult() {
        const code = generate();
        if (!code) return;
        navigator.clipboard.writeText(code).then(() => {
            status.style.opacity = '1';
            setTimeout(() => status.style.opacity = '0', 2000);
        });
    }

    [input, mode, compress].forEach(el => el.addEventListener('input', generate));
    [mode, compress].forEach(el => el.addEventListener('change', generate));
</script>

</body>
</html>
