<!DOCTYPE html>
<html lang="en">
<!-- fonts isnt included in preview D: -->
<head>
    <meta charset="UTF-8">
    <title>Rainbow Text Tool</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.ico">
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #0f0f0f; color: #e0e0e0; display: flex; justify-content: center; }
        .container { max-width: 750px; width: 100%; background: #181818; padding: 25px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #00ff88; margin-top: 0; text-align: center; letter-spacing: 1px; }
        label { display: block; margin: 15px 0 5px; font-weight: 600; color: #888; font-size: 13px; }
        textarea { width: 100%; height: 80px; padding: 12px; border-radius: 6px; border: 1px solid #444; background: #222; color: #fff; box-sizing: border-box; font-size: 15px; }
        select { width: 100%; padding: 10px; border-radius: 6px; background: #222; color: #fff; border: 1px solid #444; cursor: pointer; margin-bottom: 5px; }
        
        .options-row { display: flex; align-items: center; margin: 15px 0; background: #222; padding: 10px; border-radius: 6px; border: 1px solid #333; justify-content: space-between; }
        .slider-group { background: #222; padding: 12px; border-radius: 6px; border: 1px solid #333; margin-bottom: 10px; }
        .slider-row { display: flex; align-items: center; gap: 15px; margin-bottom: 5px; }
        .slider-row label { margin: 0; min-width: 80px; }
        .val-display { min-width: 45px; font-family: monospace; color: #00ff88; font-weight: bold; text-align: right; }
        input[type="range"] { flex-grow: 1; cursor: pointer; accent-color: #00ff88; }
        
        .checkbox-group { display: flex; align-items: center; }
        .checkbox-group input { margin-right: 10px; transform: scale(1.2); cursor: pointer; }
        .char-counter { font-size: 12px; font-family: monospace; color: #00ff88; font-weight: bold; }
        .btn { width: 100%; padding: 15px; margin-top: 15px; border: none; border-radius: 6px; background: #00ff88; color: #000; font-weight: 800; cursor: pointer; font-size: 15px; }
        .btn:hover { background: #00cc6e; }
        
        #preview { 
            margin-top: 5px; padding: 15px; background: #000; border-radius: 6px; font-family: monospace; font-size: 11px; color: #888; border: 1px solid #333; 
            max-height: 150px; overflow-y: auto; word-wrap: break-word; overflow-wrap: break-word; white-space: normal;
        }
        
        #visual-preview { 
            margin-top: 5px; padding: 20px; background: #111; border-radius: 6px; border: 1px solid #444; min-height: 50px; 
            font-size: 24px; font-weight: bold; text-align: center; letter-spacing: 1px; word-wrap: break-word; overflow-wrap: break-word;
            display: block; white-space: pre-wrap;
        }

        .placeholder { color: #333; font-style: italic; font-size: 18px; }
        .success-msg { color: #00ff88; text-align: center; margin-top: 10px; font-weight: bold; opacity: 0; transition: 0.3s; }
    </style>
</head>
<body>

<div class="container">
    <h2>Rainbow Text Tool for BetterChat</h2>
    <label style="color: #ffaa00; text-align: center;">Character Limit: 200</label>
    
    <label>INPUT TEXT</label>
    <textarea id="input" placeholder="Type here..."></textarea>

    <label>CHOOSE FONT (Optional)</label>
    <select id="font-select">
        <option value="">No Font</option>
    </select>

    <label>CHOOSE MODE</label>
    <select id="mode">
        <option value="combined">Combined: (#color / [#dark / t])</option>
        <option value="text-only">Text Color Only: (#color / t)</option>
        <option value="outline-only">Outline Color: [#color / t]</option>
        <option value="dark-outline-only">Darker Outline Only: [#dark / t]</option>
    </select>

    <div class="slider-group">
        <div class="slider-row">
            <label>Saturation</label>
            <input type="range" id="saturation" min="0" max="100" value="100">
            <span class="val-display" id="sat-val">100%</span>
        </div>
        <div class="slider-row">
            <label>Contrast</label>
            <input type="range" id="contrast" min="10" max="90" value="50">
            <span class="val-display" id="con-val">50%</span>
        </div>
    </div>

    <div class="options-row">
        <div class="checkbox-group">
            <input type="checkbox" id="compress">
            <label for="compress" style="margin: 0; cursor: pointer; color: #fff;">Compress Characters</label>
        </div>
        <div class="char-counter">Characters: <span id="char-count">0</span></div>
    </div>

    <label>ACTUAL COLOR PREVIEW</label>
    <div id="visual-preview"></div>
    
    <button class="btn" onclick="copyResult()">Copy Text</button>
    <div id="status" class="success-msg">Copied to clipboard!</div>

    <label>EXPORT CODE (RAW)</label>
    <div id="preview"></div>
</div>

<script>
    const robloxFonts = [
        "Legacy", "Arial", "ArialBold", "SourceSans", "SourceSansBold", "SourceSansLight", "SourceSansItalic",
        "Bodoni", "Garamond", "Cartoon", "Code", "Highway", "SciFi", "Arcade", "Fantasy", "Antique",
        "SourceSansSemibold", "Gotham", "GothamMedium", "GothamBold", "GothamBlack", "AmaticSC", "Bangers",
        "Creepster", "DenkOne", "Fondamento", "FredokaOne", "GrenzeGotisch", "IndieFlower", "JosefinSans",
        "Jura", "Kalam", "LuckiestGuy", "Merriweather", "Michroma", "Nunito", "Oswald", "PatrickHand",
        "PermanentMarker", "Roboto", "RobotoCondensed", "RobotoMono", "Sarpanch", "SpecialElite",
        "TitilliumWeb", "Ubuntu", "BuilderSans", "BuilderSansMedium", "BuilderSansBold", "BuilderSansExtraBold",
        "Arimo", "ArimoBold"
    ];

    const fontDropdown = document.getElementById('font-select');
    robloxFonts.forEach((font, index) => {
        let opt = document.createElement('option');
        opt.value = font;
        opt.innerHTML = `${index}: ${font}`;
        fontDropdown.appendChild(opt);
    });

    const input = document.getElementById('input');
    const mode = document.getElementById('mode');
    const compress = document.getElementById('compress');
    const saturation = document.getElementById('saturation');
    const contrast = document.getElementById('contrast');
    const preview = document.getElementById('preview');
    const visualPreview = document.getElementById('visual-preview');
    const charCount = document.getElementById('char-count');
    const status = document.getElementById('status');
    const satVal = document.getElementById('sat-val');
    const conVal = document.getElementById('con-val');

    function hslToHex(h, s, l) {
        l /= 100;
        const a = s * Math.min(l, 1 - l) / 100;
        const f = n => {
            const k = (n + h / 30) % 12;
            const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
            return Math.round(255 * color).toString(16).padStart(2, '0');
        };
        return `#${f(0)}${f(8)}${f(4)}`;
    }

    function generate() {
        satVal.innerText = saturation.value + "%";
        conVal.innerText = contrast.value + "%";

        const text = input.value;
        const selectedMode = mode.value;
        const selectedFont = fontDropdown.value;
        const isCompressed = compress.checked;
        const sat = parseInt(saturation.value);
        const con = parseInt(contrast.value);
        let codeResult = "";
        let visualHTML = "";
        let step = 15; 
        const slash = isCompressed ? "/" : " / ";

        if (!text) {
            visualPreview.innerHTML = '<span class="placeholder">Type something to see preview...</span>';
            preview.innerText = "";
            charCount.innerText = "0";
            return "";
        }

        for (let i = 0; i < text.length; i++) {
            if (text[i] === " ") { 
                codeResult += " "; 
                visualHTML += " ";
                continue; 
            }
            const h = (i * step) % 360;
            const hex = hslToHex(h, sat, con);
            const darkHex = hslToHex(h, sat, con / 2.5);
            
            let charStyle = "";
            if (selectedMode === "text-only") {
                codeResult += `(${hex}${slash}${text[i]})`;
                charStyle = `color: ${hex};`;
            } else if (selectedMode === "outline-only") {
                codeResult += `[${hex}${slash}${text[i]}]`;
                charStyle = `color: white; text-shadow: 1px 1px 2px ${hex}, -1px -1px 2px ${hex};`;
            } else if (selectedMode === "dark-outline-only") {
                codeResult += `[${darkHex}${slash}${text[i]}]`;
                charStyle = `color: white; text-shadow: 1px 1px 2px ${darkHex}, -1px -1px 2px ${darkHex};`;
            } else if (selectedMode === "combined") {
                codeResult += `(${hex}${slash}[${darkHex}${slash}${text[i]}])`;
                charStyle = `color: ${hex}; text-shadow: 2px 2px 0px ${darkHex};`;
            }
            visualHTML += `<span style="${charStyle}">${text[i]}</span>`;
        }

        if (selectedFont !== "") {
            codeResult = `<${selectedFont}${slash}${codeResult}>`;
        }

        preview.innerText = codeResult;
        visualPreview.innerHTML = visualHTML;
        visualPreview.style.fontFamily = selectedFont ? `"${selectedFont}", sans-serif` : "inherit";
        charCount.innerText = codeResult.length;
        charCount.style.color = codeResult.length > 200 ? "#ff4444" : (codeResult.length > 100 ? "#ffaa00" : "#00ff88");
        return codeResult;
    }

    function copyResult() {
        const code = generate();
        if (!code) return;
        navigator.clipboard.writeText(code).then(() => {
            status.style.opacity = '1';
            setTimeout(() => status.style.opacity = '0', 2000);
        });
    }

    [input, mode, compress, fontDropdown, saturation, contrast].forEach(el => el.addEventListener('input', generate));
</script>

</body>
</html>
